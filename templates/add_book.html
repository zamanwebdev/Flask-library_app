{% extends 'base.html' %}
{% block title %}নতুন বই যোগ{% endblock %}
{% block topbar_title %}নতুন বই যোগ{% endblock %}
{% block content %}
<div class="page-header mb-4"><h1>নতুন বই যোগ করুন</h1></div>
<div class="row"><div class="col-12 col-md-8 col-lg-6">
<div class="card content-card">
    <div class="card-header"><i class="bi bi-plus-circle-fill me-2 text-warning"></i>বইয়ের তথ্য</div>
    <div class="card-body p-3 p-md-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">বইয়ের নাম <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" placeholder="বইয়ের পুরো নাম" required autofocus>
                </div>
                <div class="col-12">
                    <label class="form-label">লেখক <span class="text-danger">*</span></label>
                    <input type="text" name="author" class="form-control" placeholder="লেখকের নাম" required>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">ISBN</label>
                    <input type="text" name="isbn" class="form-control" placeholder="9780xxxxxxxxx">
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">Genre / বিষয়</label>
                    <input type="text" name="genre" class="form-control" placeholder="Fiction, Science…">
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">কপির সংখ্যা</label>
                    <input type="number" name="copies" class="form-control" value="1" min="1" max="100">
                </div>
                <div class="col-12 mt-2">
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-gold px-4"><i class="bi bi-plus-lg me-2"></i>বই যোগ করুন</button>
                        <a href="{{ url_for('books') }}" class="btn btn-outline-secondary">বাতিল</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
</div></div>
{% endblock %}
