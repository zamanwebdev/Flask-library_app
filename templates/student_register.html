{% extends 'base.html' %}
{% block title %}Student Registration{% endblock %}
{% block topbar_title %}Student Registration{% endblock %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-6 col-lg-5">

<div class="text-center mb-4">
    <div style="width:56px;height:56px;background:var(--gold);border-radius:14px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem">🎓</div>
    <h2 style="font-family:'Playfair Display',serif;font-weight:900">Student Registration</h2>
    <p class="text-muted">নতুন account তৈরি করুন</p>
</div>

<div class="card content-card">
    <div class="card-body p-4">
        <form method="POST" id="regForm">

            <div class="mb-3">
                <label class="form-label">পূর্ণ নাম <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="যেমন: Karim Ahmed" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">ইমেইল <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" placeholder="example@gmail.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">ফোন নম্বর</label>
                <input type="text" name="phone" class="form-control" placeholder="01X-XXXXXXXX">
            </div>

            <div class="mb-3">
                <label class="form-label">পাসওয়ার্ড <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" name="password" id="pw1" class="form-control"
                           placeholder="কমপক্ষে ৬ অক্ষর" required oninput="checkStrength(this.value);checkMatch()">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePw('pw1',this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="mt-1">
                    <div class="progress" style="height:4px;border-radius:4px">
                        <div id="sBar" class="progress-bar" style="width:0%;transition:all .3s"></div>
                    </div>
                    <div id="sText" class="form-text"></div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">পাসওয়ার্ড নিশ্চিত করুন <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" name="confirm_password" id="pw2" class="form-control"
                           placeholder="আবার লিখুন" required oninput="checkMatch()">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePw('pw2',this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div id="matchMsg" class="form-text mt-1"></div>
            </div>

            <button type="submit" id="subBtn" class="btn btn-gold w-100 py-2">
                <i class="bi bi-person-plus me-2"></i>Register করুন
            </button>
        </form>
    </div>
</div>

<div class="text-center mt-3 text-muted small">
    ইতিমধ্যে account আছে?
    <a href="{{ url_for('student_login') }}" style="color:var(--gold);font-weight:600">Login করুন</a>
</div>

</div>
</div>

<script>
function togglePw(id, btn) {
    const i = document.getElementById(id);
    i.type = i.type === 'password' ? 'text' : 'password';
    btn.innerHTML = i.type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
}
function checkStrength(v) {
    let s = 0;
    if (v.length >= 6) s++;
    if (v.length >= 10) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const lv = [
        {w:'0%',cls:'bg-danger',t:''},
        {w:'20%',cls:'bg-danger',t:'দুর্বল'},
        {w:'45%',cls:'bg-warning',t:'মোটামুটি'},
        {w:'70%',cls:'bg-info',t:'ভালো'},
        {w:'90%',cls:'bg-success',t:'শক্তিশালী'},
        {w:'100%',cls:'bg-success',t:'খুব শক্তিশালী ✓'}
    ][Math.min(s,5)];
    const b = document.getElementById('sBar');
    b.style.width = lv.w; b.className = 'progress-bar ' + lv.cls;
    const t = document.getElementById('sText');
    t.textContent = v ? lv.t : '';
    t.className = 'form-text ' + (s >= 3 ? 'text-success' : 'text-muted');
}
function checkMatch() {
    const v1 = document.getElementById('pw1').value;
    const v2 = document.getElementById('pw2').value;
    const m  = document.getElementById('matchMsg');
    const b  = document.getElementById('subBtn');
    if (!v2) { m.textContent = ''; return; }
    if (v1 === v2) {
        m.textContent = '✓ পাসওয়ার্ড মিলেছে'; m.className = 'form-text mt-1 text-success'; b.disabled = false;
    } else {
        m.textContent = '✗ পাসওয়ার্ড মিলছে না'; m.className = 'form-text mt-1 text-danger'; b.disabled = true;
    }
}
</script>
{% endblock %}
