{% extends 'base.html' %}
{% block title %}নতুন Password সেট করুন{% endblock %}
{% block topbar_title %}নতুন Password{% endblock %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-5 col-lg-4">

<div class="text-center mb-4">
    <div style="width:56px;height:56px;background:#dcfce7;border-radius:14px;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem">🔒</div>
    <h2 style="font-family:'Playfair Display',serif;font-weight:900">নতুন Password</h2>
    <p class="text-muted"><strong>{{ reset.name }}</strong> এর জন্য নতুন password সেট করুন</p>
</div>

<div class="card content-card">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">নতুন Password <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" name="new_password" id="pw1" class="form-control"
                           placeholder="কমপক্ষে ৬ অক্ষর" required
                           oninput="checkStr(this.value);chkMatch()">
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="tgl('pw1',this)"><i class="bi bi-eye"></i></button>
                </div>
                <div class="mt-1">
                    <div class="progress" style="height:4px;border-radius:4px">
                        <div id="sBar" class="progress-bar" style="width:0%;transition:all .3s"></div>
                    </div>
                    <div id="sText" class="form-text"></div>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">নিশ্চিত করুন <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="password" name="confirm_password" id="pw2" class="form-control"
                           placeholder="আবার লিখুন" required oninput="chkMatch()">
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="tgl('pw2',this)"><i class="bi bi-eye"></i></button>
                </div>
                <div id="mMsg" class="form-text mt-1"></div>
            </div>
            <button type="submit" id="subBtn" class="btn btn-gold w-100 py-2">
                <i class="bi bi-check-lg me-2"></i>Password পরিবর্তন করুন
            </button>
        </form>
    </div>
</div>

</div>
</div>

<script>
function tgl(id, btn) {
    const i = document.getElementById(id);
    i.type = i.type === 'password' ? 'text' : 'password';
    btn.innerHTML = i.type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
}
function checkStr(v) {
    let s=0;
    if(v.length>=6)s++; if(v.length>=10)s++;
    if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
    const lv=[{w:'0%',c:'bg-danger',t:''},{w:'20%',c:'bg-danger',t:'দুর্বল'},
              {w:'45%',c:'bg-warning',t:'মোটামুটি'},{w:'70%',c:'bg-info',t:'ভালো'},
              {w:'90%',c:'bg-success',t:'শক্তিশালী'},{w:'100%',c:'bg-success',t:'খুব শক্তিশালী ✓'}][Math.min(s,5)];
    const b=document.getElementById('sBar'); b.style.width=lv.w; b.className='progress-bar '+lv.c;
    const t=document.getElementById('sText'); t.textContent=v?lv.t:'';
}
function chkMatch() {
    const v1=document.getElementById('pw1').value, v2=document.getElementById('pw2').value;
    const m=document.getElementById('mMsg'), b=document.getElementById('subBtn');
    if(!v2){m.textContent='';return;}
    if(v1===v2){m.textContent='✓ মিলেছে';m.className='form-text mt-1 text-success';b.disabled=false;}
    else{m.textContent='✗ মিলছে না';m.className='form-text mt-1 text-danger';b.disabled=true;}
}
</script>
{% endblock %}
