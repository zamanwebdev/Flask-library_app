{% extends 'base.html' %}
{% block title %}নতুন সদস্য{% endblock %}
{% block topbar_title %}নতুন সদস্য{% endblock %}
{% block content %}
<div class="page-header mb-4"><h1>নতুন সদস্য যোগ</h1></div>
<div class="row"><div class="col-12 col-md-8 col-lg-6">
<div class="card content-card">
    <div class="card-header"><i class="bi bi-person-plus-fill me-2 text-warning"></i>সদস্যের তথ্য</div>
    <div class="card-body p-3 p-md-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">পূর্ণ নাম <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" placeholder="সদস্যের নাম" required autofocus>
                </div>
                <div class="col-12">
                    <label class="form-label">ইমেইল <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                </div>
                <div class="col-12 col-sm-6">
                    <label class="form-label">ফোন</label>
                    <input type="text" name="phone" class="form-control" placeholder="01X-XXXXXXXX">
                </div>
                <div class="col-12 mt-2">
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-gold px-4"><i class="bi bi-person-plus me-2"></i>সদস্য যোগ</button>
                        <a href="{{ url_for('members') }}" class="btn btn-outline-secondary">বাতিল</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
</div></div>
{% endblock %}
