{% extends 'base.html' %}
{% block title %}নতুন সদস্য{% endblock %}
{% block topbar_title %}নতুন সদস্য নিবন্ধন{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-start mb-4 page-header">
    <div><h1>নতুন সদস্য নিবন্ধন</h1><p class="text-muted mb-0">গ্রন্থাগারে নতুন সদস্য যোগ করুন</p></div>
    <a href="{{ url_for('members') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-2"></i>ফিরে যান</a>
</div>

<div class="row justify-content-start">
    <div class="col-lg-6">
        <div class="card content-card">
            <div class="card-header"><i class="bi bi-person-fill me-2 text-warning"></i>সদস্যের তথ্য</div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">পূর্ণ নাম <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required placeholder="যেমন: মোহাম্মদ রহিম">
                        </div>
                        <div class="col-12">
                            <label class="form-label">ইমেইল ঠিকানা <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" required placeholder="example@email.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">ফোন নম্বর</label>
                            <input type="text" name="phone" class="form-control" placeholder="01X-XXXXXXXX">
                        </div>
                        <div class="col-12 pt-2">
                            <button type="submit" class="btn btn-gold px-4"><i class="bi bi-person-plus me-2"></i>সদস্য যোগ করুন</button>
                            <a href="{{ url_for('members') }}" class="btn btn-outline-secondary ms-2">বাতিল</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
